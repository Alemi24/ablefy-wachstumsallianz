<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ablefy — Design System &amp; Refreshed Homepage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Hanken+Grotesk:wght@300..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ablefy.css">
<link rel="stylesheet" href="ablefy-components.css">
<style>
  html,body{ margin:0; height:100%; background:#EDEAE0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script src="content-heroes.js"></script>
<script src="content-home.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useEffect, useRef } = React;

function AbBoard({ html }){
  const ref = useRef(null);
  useEffect(()=>{
    if(ref.current){
      ref.current.innerHTML = html;
      // upgrade any <image-slot> custom elements inside injected HTML
      if (window.customElements && window.customElements.upgrade) {
        window.customElements.upgrade(ref.current);
      }
    }
  },[html]);
  return <div ref={ref} style={{ width:'100%' }} />;
}

const H = window.ABLEFY_HEROES;

function App(){
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Hero — Three Directions" subtitle="Same system, three personalities. Pick one to take to the full page.">
        <DCArtboard id="hero-a" label="A · Editorial Split" width={1440} height={900}>
          <AbBoard html={H.heroA} />
        </DCArtboard>
        <DCArtboard id="hero-b" label="B · Centered Statement" width={1440} height={952}>
          <AbBoard html={H.heroB} />
        </DCArtboard>
        <DCArtboard id="hero-c" label="C · Forest Premium" width={1440} height={900}>
          <AbBoard html={H.heroC} />
        </DCArtboard>
      </DCSection>

      <DCSection id="home" title="The Refreshed Homepage" subtitle="Direction B, built out full-scroll — centered statement, confident Fraunces headlines, signature green.">
        <DCArtboard id="homepage" label="ablefy.io · Home (Direction B)" width={1440} height={5600}>
          <AbBoard html={window.ABLEFY_HOME} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
